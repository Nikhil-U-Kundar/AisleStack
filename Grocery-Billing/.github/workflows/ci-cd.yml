name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── BACKEND ─────────────────────────────────────────────────────────────────
  backend-lint-test-build:
    name: Backend — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Lint (go vet)
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Build binary
        run: go build -o server ./cmd/server/main.go

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/server

  # ─── FRONTEND ────────────────────────────────────────────────────────────────
  frontend-lint-test-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─── DEPLOY ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-lint-test-build, frontend-lint-test-build]
    # Only deploy on pushes to main/master (not on PRs)
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: deploy/backend/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: deploy/frontend/

      # ── Replace the step below with your actual deployment target ──────────
      # Example: SSH to a server, push to a cloud provider, etc.
      - name: Deploy (placeholder)
        run: |
          echo "✅ Backend binary and frontend dist are ready under deploy/"
          echo "👉 Add your deployment step here (SSH, Docker, cloud CLI, etc.)"
          ls -lh deploy/backend/ deploy/frontend/
